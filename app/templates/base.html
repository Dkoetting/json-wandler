<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Wandler</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">
    <nav class="border-b border-gray-800 px-6 py-4">
        <div class="max-w-4xl mx-auto flex items-center justify-between">
            <a href="/" class="text-xl font-bold text-white">JSON Wandler</a>
            <span class="text-sm text-gray-500">ChatGPT GPT → Claude / Gemini / Grok / Perplexity</span>
        </div>
    </nav>
    <main class="max-w-4xl mx-auto px-6 py-10">
        {% block content %}{% endblock %}
    </main>
    <footer class="border-t border-gray-800 px-6 py-4 mt-20">
        <div class="max-w-4xl mx-auto text-center text-sm text-gray-600">
            JSON Wandler &mdash; MVP
        </div>
    </footer>
</body>
</html>
